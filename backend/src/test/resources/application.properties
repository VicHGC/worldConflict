spring.datasource.url=jdbc:mysql://localhost:3306/worldConflict_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081

jwt.secret=TestSecretKeyForJWTMustBeAtLeast256BitsLongForTesting
jwt.expiration=86400000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google

api.oil-key=${OIL_PRICE_API_KEY:dummy}
api.news-key=${NEWS_API_KEY:dummy}
api.commodity-key=${COMMODITY_API_KEY:dummy}
api.alpha-vantage-key=${ALPHA_VANTAGE_KEY:dummy}
